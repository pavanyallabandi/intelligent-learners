{% extends 'base.html' %}

{% block title %}Login - StudyHub{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-header">
        <h1>Welcome Back</h1>
        <p>Login to track your learning progress.</p>
    </div>

    <div class="glass-card">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field.errors }}
                <input type="{{ field.field.widget.input_type }}" name="{{ field.name }}" id="{{ field.id_for_label }}" class="form-control" {% if field.field.required %}required{% endif %}>
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                <i data-lucide="log-in" style="width: 18px;"></i>
                Login
            </button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
            Don't have an account? <a href="{% url 'register' %}" style="color: var(--primary); font-weight: 500;">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
